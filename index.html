<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordnus — ভোকাব লার্নিং</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #55556a;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --green-border: rgba(74,222,128,0.3);
  --orange: #fb923c;
  --orange-bg: rgba(251,146,60,0.1);
  --orange-border: rgba(251,146,60,0.3);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --red-border: rgba(248,113,113,0.3);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* bg grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }

/* ── HEADER ── */
.header {
  padding: 2rem 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #a78bfa, #7c6af7, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-meta { font-size: 12px; color: var(--text3); }

/* ── PROGRESS BAR ── */
.global-progress {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 4px;
  background: linear-gradient(90deg, var(--accent), #60a5fa);
  border-radius: 99px;
  transition: width 0.5s ease;
}
.progress-text { font-size: 12px; color: var(--text2); white-space: nowrap; }

/* ── LIST SELECTOR ── */
.list-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.list-chip {
  padding: 6px 14px;
  border-radius: 99px;
  border: 0.5px solid var(--border2);
  background: var(--surface);
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.list-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── SETS GRID ── */
.section-label {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.sets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 1.5rem;
}
.set-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 0.75rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.set-card:hover:not(.locked) { border-color: var(--border2); transform: translateY(-2px); }
.set-card.locked { opacity: 0.35; cursor: not-allowed; }
.set-card.done { border-color: var(--green-border); }
.set-card.done::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
}
.set-card.active-set { border-color: var(--accent); }
.set-card.active-set::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.set-icon { font-size: 20px; margin-bottom: 6px; }
.set-num { font-size: 13px; font-weight: 500; color: var(--text); }
.set-label { font-size: 10px; color: var(--text3); margin-top: 3px; }
.start-btn {
  width: 100%;
  padding: 0.9rem;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1.5rem;
}
.start-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── SCREEN TRANSITIONS ── */
.screen { display: none; animation: fadeUp 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── WORD SCREEN ── */
.word-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.back-btn {
  font-size: 13px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  font-family: 'Sora', sans-serif;
}
.back-btn:hover { color: var(--text2); }
.word-dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  transition: all 0.3s;
}
.dot.green { background: var(--green); border-color: var(--green); }
.dot.orange { background: var(--orange); border-color: var(--orange); }
.dot.red { background: var(--red); border-color: var(--red); }
.dot.current { transform: scale(1.4); border-color: var(--accent2); }

.word-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.word-main { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.word-pos {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  background: rgba(124,106,247,0.15);
  border: 0.5px solid rgba(124,106,247,0.3);
  color: var(--accent2);
  margin-bottom: 14px;
}
.word-def { font-size: 15px; color: var(--text); line-height: 1.7; margin-bottom: 12px; }
.syn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.syn-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  color: var(--text2);
}
.ant-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  background: var(--red-bg);
  border: 0.5px solid var(--red-border);
  color: var(--red);
}
.bangla-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 1rem;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
  margin-bottom: 14px;
  border-left: 2px solid var(--accent);
}
.examples-label { font-size: 11px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.example-item {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--border);
}
.example-item:last-child { border-bottom: none; }
.example-item em { color: var(--accent2); font-style: normal; font-weight: 500; }
.ai-loading-text { font-size: 13px; color: var(--text3); text-align: center; padding: 1rem 0; }

.conf-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.conf-btn {
  padding: 0.75rem;
  border-radius: var(--radius);
  border: 0.5px solid;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.4;
}
.conf-btn:hover { transform: translateY(-2px); }
.btn-green { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.btn-orange { background: var(--orange-bg); border-color: var(--orange-border); color: var(--orange); }
.btn-red { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }

/* ── QUIZ SCREEN ── */
.quiz-header { margin-bottom: 1.25rem; }
.quiz-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.quiz-sub { font-size: 13px; color: var(--text2); }
.score-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.score-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  transition: all 0.3s;
}
.score-chip.one { background: var(--orange-bg); border-color: var(--orange-border); color: var(--orange); }
.score-chip.done { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

.quiz-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.quiz-q { font-size: 16px; font-weight: 500; line-height: 1.6; margin-bottom: 1.25rem; color: var(--text); }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  padding: 0.8rem 1rem;
  border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2);
  background: var(--surface2);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,106,247,0.1); }
.quiz-opt.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.quiz-opt.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.quiz-feedback {
  font-size: 13px;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  display: none;
}
.feedback-correct { background: var(--green-bg); color: var(--green); }
.feedback-wrong { background: var(--red-bg); color: var(--red); }

.quiz-next-btn {
  width: 100%;
  padding: 0.85rem;
  border-radius: var(--radius);
  border: 0.5px solid var(--accent);
  background: transparent;
  color: var(--accent2);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  cursor: pointer;
  margin-top: 1rem;
  display: none;
  transition: all 0.2s;
}
.quiz-next-btn:hover { background: rgba(124,106,247,0.1); }

/* ── DONE SCREEN ── */
.done-screen {
  text-align: center;
  padding: 3rem 1rem;
}
.done-icon { font-size: 52px; margin-bottom: 1rem; }
.done-title { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 0.5rem; }
.done-sub { font-size: 14px; color: var(--text2); margin-bottom: 2rem; line-height: 1.7; }
.done-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 2rem;
}
.stat-box {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.stat-num { font-size: 24px; font-weight: 600; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
.home-btn {
  padding: 0.9rem 2.5rem;
  border-radius: var(--radius);
  border: 0.5px solid var(--accent);
  background: transparent;
  color: var(--accent2);
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.home-btn:hover { background: rgba(124,106,247,0.15); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Wordnus</div>
    <div class="header-meta" id="header-meta">GRE 333 · ০/৬৭ সেট</div>
  </div>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="global-progress">
      <div class="progress-track"><div class="progress-fill" id="global-bar" style="width:0%"></div></div>
      <div class="progress-text" id="global-pct">০% সম্পন্ন</div>
    </div>

    <div class="list-selector">
      <div class="list-chip active">GRE 333</div>
      <div class="list-chip" style="opacity:0.4; cursor:not-allowed;">Barron's 800</div>
      <div class="list-chip" style="opacity:0.4; cursor:not-allowed;">Magoosh 1000</div>
      <div class="list-chip" style="opacity:0.4; cursor:not-allowed;">Word Smart</div>
    </div>

    <div class="section-label">সেট নির্বাচন করো</div>
    <div class="sets-grid" id="sets-grid"></div>
    <button class="start-btn" id="start-btn" onclick="startCurrentSet()">সেট শুরু করো →</button>
  </div>

  <!-- WORD SCREEN -->
  <div id="screen-word" class="screen">
    <div class="word-nav">
      <button class="back-btn" onclick="goHome()">← ফিরে যাও</button>
      <div class="word-dots" id="word-dots"></div>
      <span style="font-size:12px; color:var(--text3);" id="word-counter"></span>
    </div>
    <div class="word-card" id="word-card">
      <div class="ai-loading-text">লোড হচ্ছে...</div>
    </div>
    <div class="conf-btns">
      <button class="conf-btn btn-green" onclick="markWord('green')">আত্মবিশ্বাসী<br><span style="font-size:10px; opacity:0.7;">ভালো জানি</span></button>
      <button class="conf-btn btn-orange" onclick="markWord('orange')">মোটামুটি<br><span style="font-size:10px; opacity:0.7;">আরেকটু লাগবে</span></button>
      <button class="conf-btn btn-red" onclick="markWord('red')">চিন্তিত<br><span style="font-size:10px; opacity:0.7;">বারবার দেখবো</span></button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="back-btn" onclick="goHome()" style="cursor:pointer; font-size:13px; color:var(--text3); margin-bottom:0.75rem;">← ফিরে যাও</div>
      <div class="quiz-title">কুইজ — সেট <span id="quiz-set-label"></span></div>
      <div class="quiz-sub">প্রতিটি শব্দে ২টি সঠিক উত্তর দিতে হবে</div>
    </div>
    <div class="score-chips" id="score-chips"></div>
    <div class="quiz-card">
      <div class="ai-loading-text" id="quiz-loading">প্রশ্ন তৈরি হচ্ছে...</div>
      <div id="quiz-content" style="display:none;">
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-opts" id="quiz-opts"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
        <button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuizQ()">পরের প্রশ্ন →</button>
      </div>
    </div>
    <div style="font-size:12px; color:var(--text3); text-align:center;" id="quiz-progress-hint"></div>
  </div>

  <!-- DONE SCREEN -->
  <div id="screen-done" class="screen">
    <div class="done-screen">
      <div class="done-icon">🎯</div>
      <div class="done-title">সেট সম্পন্ন!</div>
      <div class="done-sub">তুমি এই সেটের সব শব্দ শিখেছো<br>এবং কুইজ পাস করেছো।</div>
      <div class="done-stats">
        <div class="stat-box">
          <div class="stat-num" id="stat-green" style="color:var(--green);">0</div>
          <div class="stat-label">আত্মবিশ্বাসী</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-orange" style="color:var(--orange);">0</div>
          <div class="stat-label">মোটামুটি</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-red" style="color:var(--red);">0</div>
          <div class="stat-label">চিন্তিত</div>
        </div>
      </div>
      <button class="home-btn" onclick="goHome()">হোমে ফিরে যাও</button>
    </div>
  </div>
</div>

<script>
// ── WORD DATA ──
const WORD_DATA = {
  "GRE 333": [
    [
      { word:"Aberrant", pos:"adjective", def:"Departing from an accepted standard; deviating from the norm.", bangla:"স্বাভাবিক থেকে বিচ্যুত। যেমন কেউ যদি সমাজের নিয়ম না মেনে অদ্ভুত আচরণ করে, তাকে aberrant behavior বলা হয়।", synonyms:["deviant","anomalous","atypical"], antonyms:["normal","typical"], examples:["The scientist noticed aberrant results that defied all previous models.", "Her aberrant behavior alarmed her colleagues at the firm."] },
      { word:"Abjure", pos:"verb", def:"To solemnly renounce or reject a belief, claim, or course of action.", bangla:"দৃঢ়ভাবে কিছু ত্যাগ করা। একজন রাজনীতিবিদ যদি তার পুরনো মতাদর্শ সম্পূর্ণভাবে ছেড়ে দেন, তখন বলা হয় তিনি abjure করেছেন।", synonyms:["renounce","recant","forswear"], antonyms:["embrace","uphold"], examples:["He abjured his former political beliefs after years of reflection.", "The witness abjured all previous testimony under oath."] },
      { word:"Abstruse", pos:"adjective", def:"Difficult to understand; obscure and complex in nature.", bangla:"কঠিন বা দুর্বোধ্য। বিশ্ববিদ্যালয়ের দর্শন পরীক্ষার একটি প্রশ্ন যদি এতটাই জটিল হয় যে বেশিরভাগই বুঝতে পারে না, তাহলে সেটা abstruse।", synonyms:["obscure","esoteric","recondite"], antonyms:["clear","simple","lucid"], examples:["The professor's abstruse lecture left most students utterly confused.", "Quantum mechanics can seem abstruse to those without a physics background."] },
      { word:"Acerbic", pos:"adjective", def:"Sharp and forthright; harsh or severe in manner or expression.", bangla:"তীক্ষ্ণ বা কটু। কোনো সমালোচক যদি কাউকে এমনভাবে সমালোচনা করেন যা শুনতে খুব কঠোর লাগে, তাহলে তার ভাষাকে acerbic বলা হয়।", synonyms:["caustic","sardonic","mordant"], antonyms:["mild","gentle","pleasant"], examples:["Her acerbic wit could cut through any pretension in the room.", "The critic's acerbic review devastated the young playwright."] },
      { word:"Acrimony", pos:"noun", def:"Bitterness or ill feeling, especially in speech or manner.", bangla:"তিক্ততা বা বিদ্বেষ। দুই পুরনো বন্ধুর মধ্যে যখন সম্পর্ক ভেঙে যায় এবং তারা তিক্তভাবে কথা বলে, সেই অবস্থাকে acrimony বলা যায়।", synonyms:["bitterness","rancor","animosity"], antonyms:["goodwill","amity","harmony"], examples:["The divorce proceedings were marked by intense acrimony.", "Years of acrimony between the two families finally came to a head."] }

// ── STATE ──
const TOTAL_SETS = 67;
let state = {
  currentList: "GRE 333",
  selectedSet: 0,
  sets: loadSets(),
  wordIdx: 0,
  quizData: [],
  quizIdx: 0,
  correctCounts: {},
  currentSetMarks: []
};

function loadSets() {
  const saved = localStorage.getItem('wordnus_sets');
  if (saved) return JSON.parse(saved);
  const s = Array.from({length: TOTAL_SETS}, (_, i) => ({
    id: i + 1,
    status: i === 0 ? 'unlocked' : 'locked',
    marks: []
  }));
  return s;
}

function saveSets() {
  localStorage.setItem('wordnus_sets', JSON.stringify(state.sets));
}

function getWords() {
  const lists = WORD_DATA[state.currentList];
  const idx = state.selectedSet;
  return lists[idx] || lists[0];
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { showScreen('screen-home'); renderHome(); }

// ── HOME ──
function renderHome() {
  const done = state.sets.filter(s => s.status === 'done').length;
  const pct = Math.round((done / TOTAL_SETS) * 100);
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = pct + '% সম্পন্ন';
  document.getElementById('header-meta').textContent = `GRE 333 · ${done}/${TOTAL_SETS} সেট`;

  const grid = document.getElementById('sets-grid');
  const maxShow = Math.min(TOTAL_SETS, 20);
  grid.innerHTML = '';

  for (let i = 0; i < maxShow; i++) {
    const s = state.sets[i];
    const card = document.createElement('div');
    const icons = { locked: '🔒', unlocked: '📖', done: '✅' };
    const labels = { locked: 'লকড', unlocked: 'শুরু করো', done: 'সম্পন্ন' };
    card.className = 'set-card' +
      (s.status === 'locked' ? ' locked' : '') +
      (s.status === 'done' ? ' done' : '') +
      (state.selectedSet === i ? ' active-set' : '');
    card.innerHTML = `<div class="set-icon">${icons[s.status]}</div><div class="set-num">সেট ${s.id}</div><div class="set-label">${labels[s.status]}</div>`;
    if (s.status !== 'locked') card.onclick = () => selectSet(i);
    grid.appendChild(card);
  }

  const btn = document.getElementById('start-btn');
  const sel = state.sets[state.selectedSet];
  btn.disabled = sel.status === 'locked' || sel.status === 'done';
  btn.textContent = sel.status === 'done' ? 'সম্পন্ন ✅' : `সেট ${state.selectedSet + 1} শুরু করো →`;
}

function selectSet(i) {
  state.selectedSet = i;
  renderHome();
}

function startCurrentSet() {
  state.wordIdx = 0;
  state.currentSetMarks = [];
  showScreen('screen-word');
  renderWord();
}

// ── WORD SCREEN ──
function renderWord() {
  const words = getWords();
  const w = words[state.wordIdx];
  renderDots();
  document.getElementById('word-counter').textContent = `${state.wordIdx + 1} / ${words.length}`;
  document.getElementById('word-card').innerHTML = `

      <div class="syn-row">${w.antonyms.map(a => `<span class="ant-chip">${a}</span>`).join('')}</div>
    </div>
    <div class="bangla-box">${w.bangla}</div>
    <div class="examples-label">উদাহরণ বাক্য</div>
    ${w.examples.map(e => {
      const highlighted = e.replace(new RegExp(w.word, 'gi'), `<em>${w.word}</em>`);
      return `<div class="example-item">${highlighted}</div>`;
    }).join('')}
  `;
}

function renderDots() {
  const words = getWords();
  const c = document.getElementById('word-dots');
  c.innerHTML = '';
  words.forEach((_, i) => {
    const d = document.createElement('div');
    const m = state.currentSetMarks[i];
    d.className = 'dot' + (m ? ' ' + m : '') + (i === state.wordIdx ? ' current' : '');
    c.appendChild(d);
  });
}

function markWord(color) {
  state.currentSetMarks[state.wordIdx] = color;
  const words = getWords();
  if (state.wordIdx < words.length - 1) {
    state.wordIdx++;
    renderWord();
  } else {
    state.sets[state.selectedSet].marks = state.currentSetMarks;
    saveSets();
    startQuiz();
  }
}

// ── QUIZ ──
function startQuiz() {
  showScreen('screen-quiz');
  document.getElementById('quiz-set-label').textContent = state.selectedSet + 1;
  const words = getWords();
  state.correctCounts = {};
  words.forEach(w => state.correctCounts[w.word] = 0);
  state.quizIdx = 0;
  state.quizData = buildQuiz(words);
  renderScoreChips();
  showQuizQ();
  document.getElementById('quiz-loading').style.display = 'none';
  document.getElementById('quiz-content').style.display = 'block';
}

function buildQuiz(words) {
  const qs = [];
  words.forEach(w => {
    const allDefs = words.map(x => x.def);
    const wrongDefs = allDefs.filter(d => d !== w.def).sort(() => Math.random() - 0.5).slice(0, 3);
    qs.push({
      word: w.word,
      question: `"${w.word}" — সঠিক অর্থ কোনটি?`,
      options: [w.def, ...wrongDefs].sort(() => Math.random() - 0.5),
      answer: w.def
    });
    const allSyns = words.flatMap(x => x.synonyms).filter(s => !w.synonyms.includes(s));
    const wrongSyns = allSyns.sort(() => Math.random() - 0.5).slice(0, 3);
    if (wrongSyns.length >= 3) {
      qs.push({
        word: w.word,
        question: `"${w.word}" এর synonym কোনটি?`,
        options: [w.synonyms[0], ...wrongSyns].sort(() => Math.random() - 0.5),
        answer: w.synonyms[0]
      });
    }
  });
  return qs.sort(() => Math.random() - 0.5);
}

function renderScoreChips() {
  const d = document.getElementById('score-chips');
  d.innerHTML = Object.entries(state.correctCounts).map(([word, cnt]) => {
    const cls = cnt >= 2 ? 'done' : cnt === 1 ? 'one' : '';
    return `<span class="score-chip ${cls}">${word} ${cnt}/2</span>`;
  }).join('');
}

function showQuizQ() {
  const allDone = Object.values(state.correctCounts).every(v => v >= 2);
  if (allDone) { finishSet(); return; }

  let q, attempts = 0;
  do {
    q = state.quizData[state.quizIdx % state.quizData.length];
    state.quizIdx++;
    attempts++;
  } while (state.correctCounts[q.word] >= 2 && attempts < 30);

  document.getElementById('quiz-q').textContent = q.question;
  const opts = document.getElementById('quiz-opts');
  opts.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQ(btn, opt, q.answer, q.word);
    opts.appendChild(btn);
  });

  document.getElementById('quiz-feedback').style.display = 'none';
  document.getElementById('quiz-next-btn').style.display = 'none';

  const rem = Object.values(state.correctCounts).filter(v => v < 2).length;
  document.getElementById('quiz-progress-hint').textContent = `আরও ${rem} টি শব্দে ২টি সঠিক উত্তর দরকার`;
  renderScoreChips();
}

function answerQ(btn, chosen, correct, word) {
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('quiz-feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    state.correctCounts[word] = (state.correctCounts[word] || 0) + 1;
    fb.textContent = '✓ সঠিক উত্তর!';
    fb.className = 'quiz-feedback feedback-correct';
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗ ভুল হয়েছে। সঠিক উত্তরটি হাইলাইট করা হয়েছে।';
    fb.className = 'quiz-feedback feedback-wrong';
  }
  fb.style.display = 'block';
  document.getElementById('quiz-next-btn').style.display = 'block';
  renderScoreChips();
}

function nextQuizQ() {
  const allDone = Object.values(state.correctCounts).every(v => v >= 2);
  if (allDone) { finishSet(); return; }
  showQuizQ();
}

// ── FINISH SET ──
function finishSet() {
  state.sets[state.selectedSet].status = 'done';
  const next = state.selectedSet + 1;
  if (next < TOTAL_SETS) state.sets[next].status = 'unlocked';
  saveSets();

  const marks = state.currentSetMarks;
  document.getElementById('stat-green').textContent = marks.filter(m => m === 'green').length;
  document.getElementById('stat-orange').textContent = marks.filter(m => m === 'orange').length;
  document.getElementById('stat-red').textContent = marks.filter(m => m === 'red').length;
  showScreen('screen-done');
}

// ── INIT ──
renderHome();
</script>
